<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>物理乐园 · 3D 修园开夜</title>
<meta name="description" content="停电的游乐园等你用物理点亮:修好过山车、跳楼机、电磁馆,乘坐验证你的预测。高中物理学考 3D 场景游戏。">
<meta name="theme-color" content="#19324a"><style>:root {
  color-scheme: light dark;
  --paper: #f7edda;
  --ink: #19324a;
  --orange: #f28b50;
  --zone-bx1: #df766d;
  --zone-bx2: #55a68d;
  --zone-bx3: #8b78b8;
  --zone-common: #e2b45d;
  --card: rgba(247, 237, 218, 0.94);
  --muted: #5f7180;
  --danger: #a9423e;
  --shadow: 0 18px 60px rgba(9, 24, 37, 0.25);
  font-family: "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
}

* { box-sizing: border-box; }
html, body { width: 100%; min-width: 320px; min-height: 100%; margin: 0; overflow: hidden; }
body { background: #405265; color: var(--ink); }
button, input { font: inherit; }
button, a, input { min-height: 44px; }
button {
  border: 2px solid var(--ink); border-radius: 14px; padding: 10px 16px;
  background: var(--paper); color: var(--ink); font-weight: 750; cursor: pointer;
  box-shadow: 3px 3px 0 var(--ink); transition: transform 120ms ease, box-shadow 120ms ease;
}
button:hover { transform: translateY(-2px); box-shadow: 4px 5px 0 var(--ink); }
button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
button:disabled { cursor: not-allowed; opacity: 0.45; transform: none; }
button.primary { background: var(--orange); }
a { color: var(--ink); font-weight: 800; }

#gl { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
#app { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
#hud {
  display: flex; align-items: center; gap: 14px; margin: max(10px, env(safe-area-inset-top)) 12px 0;
  padding: 8px 10px; border: 2px solid var(--ink); border-radius: 16px;
  background: var(--card); box-shadow: var(--shadow); pointer-events: auto;
}
#hud .brand { min-height: 38px; padding: 5px 10px; box-shadow: none; background: var(--orange); }
#hud > span { margin-right: auto; font-weight: 800; }
.overview-trigger { min-height: 38px; padding: 5px 11px; box-shadow: none; }
.motion { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; }
.motion input { min-height: 24px; width: 20px; }
#panel { position: absolute; inset: 76px 12px 18px; display: grid; place-items: end center; }
#panel.modal-open { inset: 0; padding: 76px 12px 18px; pointer-events: auto; background: rgba(9,24,37,.38); }
.card {
  width: min(680px, 100%); max-height: min(74vh, 720px); overflow: auto;
  padding: clamp(20px, 4vw, 36px); border: 3px solid var(--ink); border-radius: 24px;
  background: var(--card); box-shadow: var(--shadow); pointer-events: auto;
}
.hero { place-self: center; }
.hero h1 { margin: 6px 0 14px; font-size: clamp(34px, 7vw, 64px); line-height: 1.08; letter-spacing: -0.04em; }
.card h2 { margin: 6px 0 16px; font-size: clamp(25px, 5vw, 38px); }
.card p { line-height: 1.7; }
.eyebrow, .speaker { margin: 0; color: var(--orange); font-weight: 900; letter-spacing: 0.1em; }
.ticket-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.ticket-chip { display: flex; min-height: 104px; flex-direction: column; align-items: flex-start; gap: 4px; text-align: left; }
.ticket-chip span, .ticket-chip small { font-size: 12px; color: var(--muted); }
.ticket-chip.done { border-color: var(--zone-bx2); }
.contact-card { width: min(430px, calc(100% - 132px)); margin-bottom: 8px; padding: 16px 18px; }
.contact-card h2 { margin-bottom: 10px; font-size: 25px; }
.contact-tickets { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
.contact-tickets .ticket-chip { min-height: 82px; padding: 8px 10px; }
.free-entry { display: flex; width: 100%; align-items: center; justify-content: space-between; margin: 0 0 10px; background: var(--zone-common); }
.free-entry small { font-size: 12px; }
.park-overview { place-self: center; }
.card-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
.card-heading h2 { margin-bottom: 10px; }
.card-heading > button { min-width: 44px; padding: 4px 12px; font-size: 28px; }
.answers, .rig-controls { display: grid; gap: 12px; }
.answers { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
.answers label, .rig-controls label { display: grid; gap: 8px; font-weight: 800; }
input[type="range"] { width: 100%; accent-color: var(--orange); }
.hint { color: var(--muted); font-size: 14px; }
.formulas { display: grid; gap: 10px; margin: 18px 0; }
.formula { display: grid; gap: 5px; padding: 14px; border-left: 6px solid var(--orange); border-radius: 10px; background: rgba(255,255,255,.5); }
.formula span { font: 800 23px Georgia, serif; }
.formula small { color: var(--muted); }
.explain.pass { border-color: var(--zone-bx2); }
.explain.fail { border-color: var(--danger); }
.ride-hud { width: min(460px, 100%); margin-bottom: 12px; }
.ride-readout { display: grid; gap: 5px; padding: 12px 14px; border-radius: 14px; background: rgba(25,50,74,.88); color: var(--paper); }
.ride-readout > strong { font-size: 30px; }
.ride-readout small { opacity: .85; }
.energy-row { display: grid; grid-template-columns: 28px 1fr 64px; align-items: center; gap: 8px; font-weight: 900; }
.energy-row i { height: 12px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.2); }
.energy-row b { display: block; height: 100%; background: var(--orange); }
.energy-row.potential b { background: var(--zone-bx3); }
.energy-row output { text-align: right; }
#toast {
  position: absolute; top: 86px; left: 50%; translate: -50% 0; max-width: calc(100% - 28px);
  padding: 8px 14px; border-radius: 999px; background: var(--ink); color: var(--paper);
  font-size: 14px; opacity: 0.92; pointer-events: none;
}
#toast:empty { display: none; }
.joystick {
  position: absolute; left: max(22px, env(safe-area-inset-left)); bottom: max(24px, env(safe-area-inset-bottom));
  width: 118px; height: 118px; border: 3px solid rgba(247,237,218,.75); border-radius: 50%;
  background: rgba(25,50,74,.42); touch-action: none; pointer-events: auto;
}
.joystick-knob {
  position: absolute; left: 34px; top: 34px; width: 46px; height: 46px;
  border: 2px solid var(--ink); border-radius: 50%; background: var(--orange); box-shadow: 2px 2px 0 var(--ink);
}
.fallback { place-self: center; }
.freeplay label, .firework-card label { display: grid; gap: 9px; margin: 12px 0; font-weight: 850; }
.freeplay button, .firework-card button, .scorecard button { margin: 6px 8px 0 0; }
.scorecard h1 { margin: 4px 0 16px; color: var(--orange); font-size: clamp(46px, 11vw, 76px); letter-spacing: .08em; }
.score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.score-grid strong { display: grid; place-items: center; padding: 14px 6px; border-radius: 15px; background: rgba(25,50,74,.12); font-size: 32px; }
.score-grid small { color: var(--muted); font-size: 12px; }
body.cinematic #app { display: none; }

@media (max-width: 560px) {
  #hud { gap: 7px; font-size: 12px; }
  #hud .brand { font-size: 12px; }
  #hud > span { display: none; }
  .overview-trigger { margin-left: auto; font-size: 12px; }
  .motion { max-width: 72px; }
  #panel { inset: 70px 8px 10px; }
  .card { padding: 18px; border-radius: 19px; }
  .ticket-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .ticket-chip { padding: 9px; }
  .contact-card { width: calc(100% - 104px); padding: 13px; }
  .contact-tickets { grid-template-columns: 1fr; }
  .contact-tickets .ticket-chip { min-height: 68px; }
  .joystick { width: 100px; height: 100px; }
  .joystick-knob { left: 27px; top: 27px; width: 42px; height: 42px; }
}

@media (prefers-color-scheme: dark) {
  :root { --card: rgba(25, 50, 74, 0.94); --muted: #c7d4dc; --shadow: 0 18px 60px rgba(0,0,0,.38); }
  body, button, a { color: var(--paper); }
  button { background: #294860; border-color: var(--paper); box-shadow: 3px 3px 0 var(--paper); }
  button.primary, #hud .brand { color: var(--ink); }
  #hud, .card { border-color: var(--paper); }
  .formula { background: rgba(0,0,0,.18); }
}

@media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; transition-duration: 0.01ms !important; } }
</style></head>
