<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>物理乐园 · 3D 修园开夜</title>
<meta name="description" content="停电的游乐园等你用物理点亮:修好过山车、跳楼机、电磁馆,乘坐验证你的预测。高中物理学考 3D 场景游戏。">
<meta name="theme-color" content="#19324a"><style>:root {
  color-scheme: light dark;
  --paper: #f7edda;
  --ink: #19324a;
  --orange: #f28b50;
  --zone-bx1: #df766d;
  --zone-bx2: #55a68d;
  --zone-bx3: #8b78b8;
  --zone-common: #e2b45d;
  --card: rgba(247, 237, 218, 0.94);
  --muted: #5f7180;
  --danger: #a9423e;
  --shadow: 0 18px 60px rgba(9, 24, 37, 0.25);
  font-family: "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
}

* { box-sizing: border-box; }
html, body { width: 100%; min-width: 320px; min-height: 100%; margin: 0; overflow: hidden; }
body { background: #405265; color: var(--ink); }
button, input { font: inherit; }
button, a, input { min-height: 44px; }
button {
  border: 2px solid var(--ink); border-radius: 14px; padding: 10px 16px;
  background: var(--paper); color: var(--ink); font-weight: 750; cursor: pointer;
  box-shadow: 3px 3px 0 var(--ink); transition: transform 120ms ease, box-shadow 120ms ease;
}
button:hover { transform: translateY(-2px); box-shadow: 4px 5px 0 var(--ink); }
button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
button:disabled { cursor: not-allowed; opacity: 0.45; transform: none; }
button.primary { background: var(--orange); }
a { color: var(--ink); font-weight: 800; }

#gl { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
#app { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
#hud {
  display: flex; align-items: center; gap: 14px; margin: max(10px, env(safe-area-inset-top)) 12px 0;
  padding: 8px 10px; border: 2px solid var(--ink); border-radius: 16px;
  background: var(--card); box-shadow: var(--shadow); pointer-events: auto;
}
#hud .brand { min-height: 38px; padding: 5px 10px; box-shadow: none; background: var(--orange); }
#hud > span { margin-right: auto; font-weight: 800; }
.gear-count { white-space: nowrap; }
.task-tracker { display: grid; min-width: 190px; margin-right: auto; padding: 5px 11px; text-align: left; box-shadow: none; background: linear-gradient(135deg,var(--paper),#ffd9a9); }
.task-tracker small { color: var(--orange); font-weight: 900; }
.task-tracker strong { font-size: 13px; }
.overview-trigger { min-height: 38px; padding: 5px 11px; box-shadow: none; }
.motion { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; }
.motion input { min-height: 24px; width: 20px; }
#panel { position: absolute; inset: 76px 12px 18px; display: grid; place-items: end center; }
#panel.modal-open { inset: 0; padding: 76px 12px 18px; pointer-events: auto; background: rgba(9,24,37,.38); }
.card {
  width: min(680px, 100%); max-height: min(74vh, 720px); overflow: auto;
  padding: clamp(20px, 4vw, 36px); border: 3px solid var(--ink); border-radius: 24px;
  background: var(--card); box-shadow: var(--shadow); pointer-events: auto;
}
.hero { place-self: center; }
.hero h1 { margin: 6px 0 14px; font-size: clamp(34px, 7vw, 64px); line-height: 1.08; letter-spacing: -0.04em; }
.card h2 { margin: 6px 0 16px; font-size: clamp(25px, 5vw, 38px); }
.card p { line-height: 1.7; }
.eyebrow, .speaker { margin: 0; color: var(--orange); font-weight: 900; letter-spacing: 0.1em; }
.ticket-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.ticket-chip { display: flex; min-height: 104px; flex-direction: column; align-items: flex-start; gap: 4px; text-align: left; }
.ticket-chip span, .ticket-chip small { font-size: 12px; color: var(--muted); }
.ticket-chip.done { border-color: var(--zone-bx2); }
.contact-card { width: min(430px, calc(100% - 132px)); margin-bottom: 8px; padding: 16px 18px; }
.contact-card #close-contact { float: right; min-width: 44px; padding: 4px; box-shadow: none; }
.contact-card h2 { margin-bottom: 10px; font-size: 25px; }
.contact-tickets { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
.contact-tickets .ticket-chip { min-height: 82px; padding: 8px 10px; }
.free-entry { display: flex; width: 100%; align-items: center; justify-content: space-between; margin: 0 0 10px; background: var(--zone-common); }
.free-entry small { font-size: 12px; }
.park-overview { place-self: center; }
.card-heading { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
.card-heading h2 { margin-bottom: 10px; }
.card-heading > button { min-width: 44px; padding: 4px 12px; font-size: 28px; }
.answers, .rig-controls { display: grid; gap: 12px; }
.question blockquote { margin: 0 0 16px; padding: 13px 15px; border-left: 5px solid var(--orange); border-radius: 10px; background: rgba(25,50,74,.1); line-height: 1.55; }
.question blockquote strong { display: block; color: var(--orange); }
.gravity-note { display: block; margin-top: 14px; color: var(--muted); text-align: right; font-size: 11px; }
.answers { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
.answers label, .rig-controls label { display: grid; gap: 8px; font-weight: 800; }
input[type="range"] { width: 100%; accent-color: var(--orange); }
.hint { color: var(--muted); font-size: 14px; }
.formulas { display: grid; gap: 10px; margin: 18px 0; }
.formula { display: grid; gap: 5px; padding: 14px; border-left: 6px solid var(--orange); border-radius: 10px; background: rgba(255,255,255,.5); }
.formula span { font: 800 23px Georgia, serif; }
.formula small { color: var(--muted); }
.explain.pass { border-color: var(--zone-bx2); }
.explain.fail { border-color: var(--danger); }
.explain-actions { display: flex; flex-wrap: wrap; gap: 10px; }
.transfer, .extreme-hint, .quota-warning { padding: 11px 13px; border-radius: 12px; background: rgba(226,180,93,.22); font-weight: 800; }
.quota-warning { margin: 14px 0; border: 2px dashed var(--orange); }
.review-list { display: grid; gap: 8px; padding: 0; list-style: none; }
.review-list li { display: grid; gap: 3px; padding: 10px 12px; border-radius: 10px; background: rgba(25,50,74,.1); }
.review-list span { color: var(--muted); font-size: 13px; }
.ride-hud { width: min(460px, 100%); margin-bottom: 12px; }
.ride-readout { display: grid; gap: 5px; padding: 12px 14px; border-radius: 14px; background: rgba(25,50,74,.88); color: var(--paper); }
.ride-readout > strong { font-size: 30px; }
.ride-readout small { opacity: .85; }
.energy-row { display: grid; grid-template-columns: 28px 1fr 64px; align-items: center; gap: 8px; font-weight: 900; }
.energy-row i { height: 12px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.2); }
.energy-row b { display: block; height: 100%; background: var(--orange); }
.energy-row.potential b { background: var(--zone-bx3); }
.energy-row output { text-align: right; }
#toast {
  position: absolute; top: 86px; left: 50%; translate: -50% 0; max-width: calc(100% - 28px);
  padding: 8px 14px; border-radius: 999px; background: var(--ink); color: var(--paper);
  font-size: 14px; opacity: 0.92; pointer-events: none;
}
#toast:empty { display: none; }
.joystick {
  position: fixed; left: 50%; top: 50%; translate: -50% -50%;
  width: 118px; height: 118px; border: 3px solid rgba(247,237,218,.75); border-radius: 50%;
  background: rgba(25,50,74,.42); touch-action: none; pointer-events: none; backdrop-filter: blur(3px);
}
.interact-button { position: fixed; right: max(20px,env(safe-area-inset-right)); bottom: max(24px,env(safe-area-inset-bottom)); width: 76px; height: 76px; padding: 5px; border-radius: 50%; background: var(--orange); font-size: 29px; animation: breathe 1.8s ease-in-out infinite; pointer-events: auto; }
.interact-button span { display: block; font-size: 13px; }
#guide { position: fixed; left: 18px; bottom: 150px; pointer-events: none; }
.guide-bubble { max-width: 230px; padding: 12px 16px; border: 2px solid var(--ink); border-radius: 18px 18px 18px 4px; background: var(--card); box-shadow: var(--shadow); font-weight: 850; animation: pop .3s ease-out; }
#rewards { position: fixed; inset: 0; pointer-events: none; z-index: 8; }
.reward-star { position: absolute; left: 50%; top: 50%; font-style: normal; font-size: 42px; animation: star-flight 1s ease-in forwards; }
.reward-badge { position: absolute; left: 50%; top: 44%; translate: -50% -50%; display: grid; place-items: center; font-size: 88px; filter: drop-shadow(0 10px 18px rgba(0,0,0,.35)); animation: badge-pop 1s ease both; }
.reward-badge span { padding: 5px 11px; border-radius: 999px; background: var(--card); color: var(--ink); font-size: 15px; }
@keyframes breathe { 50% { scale: 1.07; filter: brightness(1.12); } }
@keyframes pop { from { opacity: 0; transform: translateY(10px) scale(.9); } }
@keyframes star-flight { 0% { transform: translate(-50%,-50%) scale(.5); opacity: 0; } 35% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; } 100% { left: 30%; top: 26px; transform: scale(.25); opacity: 0; } }
@keyframes badge-pop { 0% { opacity: 0; scale: .2; } 45% { opacity: 1; scale: 1.25; } 100% { opacity: 0; scale: 1; } }
.joystick-knob {
  position: absolute; left: 34px; top: 34px; width: 46px; height: 46px;
  border: 2px solid var(--ink); border-radius: 50%; background: var(--orange); box-shadow: 2px 2px 0 var(--ink);
}
.fallback { place-self: center; }
.freeplay label, .firework-card label { display: grid; gap: 9px; margin: 12px 0; font-weight: 850; }
.freeplay button, .firework-card button, .scorecard button { margin: 6px 8px 0 0; }
.scorecard h1 { margin: 4px 0 16px; color: var(--orange); font-size: clamp(46px, 11vw, 76px); letter-spacing: .08em; }
.score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.score-grid strong { display: grid; place-items: center; padding: 14px 6px; border-radius: 15px; background: rgba(25,50,74,.12); font-size: 32px; }
.score-grid small { color: var(--muted); font-size: 12px; }
.game-links { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 16px; padding-top: 14px; border-top: 1px dashed rgba(25,50,74,.3); }
.game-links a { display: inline-flex; align-items: center; min-height: 44px; padding: 9px 13px; border: 2px solid var(--ink); border-radius: 13px; color: var(--ink); background: var(--card); text-decoration: none; font-weight: 800; }
.game-links a:hover { background: var(--orange); }
body.cinematic #app { display: none; }
body.ride-failure #gl { animation: shake .85s ease-in-out; }
@keyframes shake { 0%,100% { transform: translate(0); } 20% { transform: translate(-5px,2px) rotate(-.15deg); } 40% { transform: translate(4px,-3px); } 60% { transform: translate(-3px,2px); } 80% { transform: translate(2px,-1px); } }

@media (max-width: 560px) {
  #hud { gap: 7px; font-size: 12px; }
  #hud .brand { font-size: 12px; }
  #hud > span { display: none; }
  #hud > span.status { display: inline; margin-right: auto; font-size: 11px; white-space: nowrap; }
  .task-tracker { min-width: 0; max-width: 145px; }
  .task-tracker strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .overview-trigger { margin-left: auto; font-size: 12px; }
  .motion { max-width: 72px; }
  #panel { inset: 70px 8px 10px; }
  .card { padding: 18px; border-radius: 19px; }
  .ticket-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .ticket-chip { padding: 9px; }
  .contact-card { width: calc(100% - 104px); padding: 13px; }
  .contact-tickets { grid-template-columns: 1fr; }
  .contact-tickets .ticket-chip { min-height: 68px; }
  .joystick { width: 108px; height: 108px; }
  .joystick-knob { left: 30px; top: 30px; width: 42px; height: 42px; }
  .motion { display: none; }
}

@media (prefers-color-scheme: dark) {
  :root { --card: rgba(25, 50, 74, 0.94); --muted: #c7d4dc; --shadow: 0 18px 60px rgba(0,0,0,.38); }
  body, button, a { color: var(--paper); }
  button { background: #294860; border-color: var(--paper); box-shadow: 3px 3px 0 var(--paper); }
  button.primary, #hud .brand { color: var(--ink); }
  #hud, .card { border-color: var(--paper); }
  .formula { background: rgba(0,0,0,.18); }
}

@media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; } }

"win":["滋！参数绿了，我的笑脸也加载到百分之百。"],"lose":["滋——这不是坏结局，是一条会发光的错因。"]}},"yuanzhang":{"id":"yuanzhang","name":"白鹭爷爷","role":"园长兼退休物理老师","quirk":"白发白眉，拄杖其实是一根带秒表的长杆","lines":{"greet":["欢迎上任，物理管理员。别看园里黑，规律可一直亮着。"],"ticketIntro":["先预测，再动手，最后坐上去看物理给不给面子。"],"win":["这就对了。物理不是背公式，是让东西动起来。"],"lose":["失败得挺壮观，说明参数确实参与了运动。免费再来。"]}}},"TICKETS":{"bumper-t1":{"id":"bumper-t1","ride":"bumper","npc":"niudali","title":"急刹时人往哪晃","storyIntro":"牛大力抱着安全杆，脸比车灯还绿：「我力气全园第一，可这车一急刹我就往前栽。快把测试车速度降下来——再晕一圈，我中午的牛肉面就保不住了。」","clue":null,"predict":{"type":"tf","q":"碰碰车急刹时人往前倾，是因为车停了，身体还想保持原来向前的速度。","a":true,"whyWrong":"答错啦！这就是惯性：刹车力先让车慢下来，你的身体没立刻被拉住，就接着往前冲——不是有人在背后推你。"},"fix":{"controls":[{"id":"v1","label":"测试车入场速度","min":1,"max":7,"step":1,"unit":"m/s","bind":"v1"}],"simModel":"bumper","simParams":{"m1":200,"m2":100,"v1":"$v1","v2":0,"e":0},"solution":{"v1":2},"pass":"v1<=1.5","wrongSample":{"values":{"v1":6},"tag":"tooFast"},"whyFail":{"tooFast":"6m/s冲进来太快啦！撞上软缓冲车后还剩约4m/s，远超1.5m/s安全线——乘员的身体还想按原速度前进，牛大力又要扶栏杆了。"}},"explain":"哇塞：急刹时根本没人推你，是你的身体「舍不得」原来的速度——惯性不是力，是万物保持原状态的倔脾气！\n急刹：车先减速，人保持原速向前；把入场速度压到2m/s，软碰后约1.3m/s，速度突变就小了。","formulaRef":["q2"],"transfer":"所以公交车急刹时全车人齐刷刷往前倒——你现在是那个知道「没人推我」的人。"},"bumper-t2":{"id":"bumper-t2","ride":"bumper","npc":"niudali","title":"六百牛推多大加速度","storyIntro":"牛大力往车里塞了三袋沙，刚坐下脸色就变了：「电机推力没变，车咋跟拖着一头牛似的？……别看我，我只是姓牛。」","clue":null,"predict":{"type":"slider","label":"600N合力推动150kg车的加速度","min":1,"max":8,"step":1,"unit":"m/s²","target":{"min":4,"max":4},"whyLow":"估小啦！F=ma 一除就出答案：600÷150=4m/s²，沙袋再多也骗不了公式。","whyHigh":"估大啦！600N要推的是150kg，质量漏除了，加速度自然虚高。"},"fix":{"controls":[{"id":"m2","label":"被撞测试车总质量","min":100,"max":300,"step":50,"unit":"kg","bind":"m2"}],"simModel":"bumper","simParams":{"m1":100,"m2":"$m2","v1":4,"v2":0,"e":1},"solution":{"m2":100},"pass":"v2>=3.9","wrongSample":{"values":{"m2":300},"tag":"tooHeavy"},"whyFail":{"tooHeavy":"测试车加到300kg就悲剧了：100kg来车以4m/s弹性一撞，它只能分到2m/s，够不着3.9m/s测试线——太重了，撞不动啊。"}},"explain":"哇塞：质量既影响受力后的加速度，也影响碰撞后的速度分配——先用 F=ma 算加速度，再看质量怎样改变碰撞结果！\n600N推150kg车，a=F/m=4m/s²；碰撞测试中，100kg等质量车能接过4m/s，300kg车只能得到2m/s。","formulaRef":["q15"],"transfer":"所以空购物车一推就窜，装满大米的推半天不动——不是你没力气，是 F=ma 在管账。"},"bumper-t3":{"id":"bumper-t3","ride":"bumper","npc":"niudali","title":"对撞曲线成一对","storyIntro":"牛大力盯着对撞力曲线，手先扶住了栏杆：「两车对撞，谁欺负谁？答完再撞。我要是又晕了，就对外宣称这是惯性演示。」","clue":"控制台下有沾黑色电工胶的小爪印；录音里反复响着『滋——瓦特……保险丝……』，随即被放电杂音截断。","predict":{"type":"choice","q":"两车正面对撞，哪组力—时间图像符合牛顿第三定律？","opts":["两条曲线同时出现，一上一下，大小时刻相等","重车那条更高，轻车那条更矮","先来车的力，过一会儿才冒出被撞车的反作用力"],"ans":0,"why":[null,"作用力和反作用力永远一样大！质量不同，只是让两车的加速度不同而已。","这对力是同时出生、同时消失的双胞胎，没有「先撞后还」的快递流程。"]},"fix":{"controls":[{"id":"m2","label":"蓝车质量","min":120,"max":240,"step":40,"unit":"kg","bind":"m2"},{"id":"e","label":"护圈恢复系数（无量纲）","min":0,"max":1,"step":0.2,"unit":"","bind":"e"}],"simModel":"bumper","simParams":{"m1":120,"m2":"$m2","v1":3,"v2":-1,"e":"$e"},"solution":{"m2":120,"e":1},"pass":"v1<=-0.9 && v2>=2.9","wrongSample":{"values":{"e":0},"tag":"noSeparation"},"whyFail":{"noSeparation":"恢复系数拧到0，两辆120kg的车碰完就黏在一起，以1m/s同向前进——既没交换速度，也没弹开，跟两团橡皮泥似的。"}},"explain":"哇塞：对撞时两车受的力一样大，谁也不占便宜——轻车飞得更远，只是因为同样的力推它更「轻松」！\nF=ma：同力不同质量，加速度不同；两车同为120kg且e=1时交换速度：3m/s与−1m/s → −1m/s与3m/s。","formulaRef":["q15"],"transfer":"所以划船时桨往后推水，船就往前走——水也在推你，一对力从来不分先后。"},"coaster-t1":{"id":"coaster-t1","ride":"coaster","npc":"yuanzhang","title":"第一坡的能量账","storyIntro":"白鹭爷爷用长杆秒表敲敲发车闸：「这车不怕高，就怕第一坡的能量账没算够。先让它只靠重力跑一圈——跑不过环顶，今天全场看你挂上面。」","clue":null,"predict":{"type":"tf","q":"忽略摩擦时，列车下滑后速度变大，是重力势能转化成了动能，机械能总量保持不变。","a":true,"whyWrong":"答错啦！忽略摩擦就只有重力在做功：势能少多少，动能就多多少，总账一分不差——能量可不会偷偷溜号。"},"fix":{"controls":[{"id":"h0","label":"第一坡出发高度","min":6,"max":14,"step":1,"unit":"m","bind":"h0"}],"simModel":"coaster","simParams":{"h0":"$h0","mu":0,"track":"loop","loopR":4,"g":10},"solution":{"h0":10},"pass":"passTop==true","wrongSample":{"values":{"h0":9},"tag":"startLow"},"whyFail":{"startLow":"出发高度只有9米，不够！半径4米的圆环，临界出发高度是2.5R=10米——差这1米，列车到环顶就攒不够做圆周运动的速度。"}},"explain":"哇塞：过山车全程没有发动机，靠的是出发时「存」下的高度——势能是存款，动能是现金，总数不变！\n机械能守恒：mgh₀=mg·2R+½mv²，环顶临界 v²=gR → h₀=2.5R=10m。 east-catch-watt","when":"ticket:emc-t4","npc":"falafa","lines":["检修盖一开，瓦特抱着半截烧穿的保险丝缩成一团，屏幕脸只剩一格电。","抓到你了——等等，它不是准备攻击，是老化接点让电流乱窜，疼得控制不了自己。"]},{"id":"act2-east-watt-truth","when":"badge:emc","npc":"watt","lines":["滋……我不是想把乐园弄黑；每次接点发热，我的指令就断成一截一截。","法拉法把新保险丝按回去：不是它坏，是它病了；电路修好，那个爱笑的瓦特就回来了。"]}],"act2-mid":[{"id":"act2-coaster-memory","when":"ticket:coaster-t1","npc":"yuanzhang","lines":["白鹭爷爷把长杆秒表擦亮：乐园全盛那年，这趟车排队能绕喷泉半圈。","他指着褪色站牌笑：孩子们怕的是第一坡，可物理从没让一辆合格列车掉链子。","今天把能量、圆环和刹车一项项接回来，也把那阵笑声接回来。"]},{"id":"act2-coaster-clawprints","when":"badge:coaster","npc":"yuanzhang","lines":["试车灯亮起，白鹭爷爷却蹲在轨道旁：润滑油里怎么有一串小爪印？","爪印钻进提升机柜，边缘焦黑，还沾着机器人关节用的蓝色润滑脂。","柜后传来带电杂音：滋——瓦……别关……随后小爪印朝电磁馆去了。"]}],"act2-west":[{"id":"act2-west-after-hoop","when":"badge:hoop","npc":"apao","lines":["投篮摊亮了，可计分器里的保险丝烧成了小黑钩，绝不是篮球干的。","阿抛从背板后揭下一枚带机油的小爪印，边缘还跳着细小电火花。","地上的爪印一路拐向碰碰车场；那边正传来滋啦滋啦的带电杂音。"]},{"id":"act2-west-after-bumper","when":"badge:bumper","npc":"niudali","lines":["碰碰车恢复供电，牛大力却从控制台下摸出同样齿口的烧焦保险丝。","黑色电工胶上印着圆爪，录音只剩一句：『滋——瓦特……电路老化……』","两处线索对上了：乱窜的不是人，更像一台带着漏电故障的乐园机器人。"]}],"act3":[{"id":"act3-repair-watt","when":"badge:emc","npc":"watt","lines":["新接点接通，瓦特的屏幕从雪花跳成笑脸：滋——系统痊愈，申请转岗随身助手！","它把公式卡收进胸前小抽屉，迈着刚修好的小爪，跟你一起去最深处的摩天轮。"]},{"id":"act3-handcrank-ferris","when":"ticket:ferris-t1","npc":"watt","lines":["主电源还没醒，瓦特抱住手摇发电机：你负责改变磁通量，我负责把滋声变成电流。","第一盏控制灯亮起，黑了半年的摩天轮轮廓从夜色里一格一格显出来。"]},{"id":"act3-lighting-ceremony","when":"badge:ferris","npc":"yuanzhang","lines":["白鹭爷爷举起长杆秒表：三、二、一——物理管理员，合上全园总闸！","六区暖灯沿环路同时亮起，喷泉重新跃起，摩天轮载着第一批游客缓缓转过最高点。"]},{"id":"act3-fireworks-finale","when":"finale","npc":"watt","lines":["烟花在摩天轮后展开，游客从入口涌进来；每一盏灯都像给你的工单盖了星章。","瓦特在你脚边弹出笑脸：随身助手已上线——下次世界不亮，我们继续用物理把它修亮。"]}]},"KB":{"chapters":{"1":{"nm":"运动的描述","bk":"必修一","s":"运动描述"},"2":{"nm":"匀变速直线运动的研究","bk":"必修一","s":"匀变速"},"3":{"nm":"相互作用——力","bk":"必修一","s":"相互作用"},"4":{"nm":"运动和力的关系","bk":"必修一","s":"运动与力"},"5":{"nm":"抛体运动","bk":"必修二","s":"抛体"},"6":{"nm":"圆周运动","bk":"必修二","s":"圆周"},"7":{"nm":"万有引力与宇宙航行","bk":"必修二","s":"万有引力"},"8":{"nm":"机械能守恒定律","bk":"必修二",
