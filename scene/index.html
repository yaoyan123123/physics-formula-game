wang_auntie","courier_zhou"],"quests":["q_elevator_scale","q_overweight_truth","q_push_crate","q_spring_door","q_bag_gravity"],"unlock":{"scene":null,"badges":0},"outro":"早高峰的电梯不只装人，还装着一整章力学。先从会晃的体重秤开始。"},{"id":"kitchen","name":"厨房与浴室","time":"evening","ch":[8,11,13],"svg":"kitchen_scene","npcs":["kitchen_dad","kitchen_mom"],"quests":["q_kitchen_appliance_power","q_kitchen_one_unit_bill","q_kitchen_joule_heat","q_kitchen_boil_time","q_kitchen_energy_match","q_kitchen_heater_value"],"unlock":{"scene":"park","badges":0},"outro":"一顿饭、一壶水和一次热水澡，电表都记得清清楚楚；会算功率，也要会算生活账。"},{"id":"park","name":"傍晚游乐场","time":"evening","ch":[6,8],"svg":"park_scene","npcs":["park_inspector","park_kid"],"quests":["q_park_ferris_speed","q_park_flying_chairs","q_park_coaster_height","q_park_loop_top","q_park_energy_truth","q_park_brake_work"],"unlock":{"scene":"court","badges":0},"outro":"灯串一亮，摩天轮、飞椅和过山车把圆周运动与机械能写满了整片晚霞。"},{"id":"power","name":"小区配电房","time":"night","ch":[9,10,11,12],"svg":"power_scene","npcs":["power_electrician","power_property"],"quests":["q_power_static_handle","q_power_parallel_hunt","q_power_ohm_lock","q_power_trip_load","q_power_ampere_meter","q_power_bird_wire"],"unlock":{"scene":"kitchen","badges":0},"outro":"最后一把闸稳稳合上，黑着的窗户从一楼亮到楼顶。有人重新烧起热水，有人在灯下翻开书；陈师傅收好表笔，小林关掉手电。小物站在重新亮起的院子里，忽然发现，今天遇见的每一道物理题，最后都变成了生活里一盏真实的灯。夜深了，物理的一天，也暖暖地收了尾。"},{"id":"road","name":"上学路上","time":"morning","ch":[1,2],"svg":"road_scene","npcs":["road_bus_driver","road_classmate"],"quests":["q_road_round_trip","q_road_green_start","q_road_crosswalk_move","q_road_brake_line","q_road_vt_area","q_road_formula_dispatch"],"unlock":{"scene":"elevator","badges":0},"outro":"车门合上，红灯转绿。今天这段上学路，路程、位移和一整张 v–t 图都赶上了早班车。"}],"NPCS":[{"id":"courier_zhou","name":"小周师傅","svg":"courier_zhou","persona":"和纸箱斗智斗勇的快递员，嘴快手更快","greet":["这箱子写着轻拿轻放，实际是重到不想动。","来搭把脑子，我负责推，你负责算。"],"done":["公式一上场，纸箱也得按规矩走。","好，今天不是我力气小，是摩擦力太有存在感。"]},{"id":"court_astronomy","name":"星遥","svg":"court_astronomy","persona":"抱着星图来看球的天文社同学，三句话就能从投篮聊到卫星","greet":["篮球落回地面，是因为还扔得不够快。","别笑，牛顿真把大炮架到高山上想过这件事。"],"done":["从篮筐聊到近地轨道，今天这场球很有宇宙尺度。","7.9 千米每秒记住了：扔得够快，真能一直掉却掉不到地上。"]},{"id":"court_coach","name":"高教练","svg":"court_coach","persona":"哨子一响就开课的体育老师，坚信好手感也得经得住抛物线","greet":["先别急着出手，篮筐不吃气势，只认轨迹。","角度和速度都调对，空心入网才算数。"],"done":["这球漂亮，手腕负责旋转，你的分运动负责进筐。","会预测再出手，命中率可比蒙一个角度稳多了。"]},{"id":"kitchen_dad","name":"赵爸","svg":"kitchen_dad","persona":"一边颠勺一边发表民间物理结论的做饭老爸，气势很足，结论经常差一项条件","greet":["火开得越大，水肯定就一秒钟烧开——功率嘛，我懂。","电水壶冒热气，说明电全变成热了，效率百分之百！"],"done":["行，今天这锅结论先回炉，公式比锅铲硬。","原来快不等于省，输入能量和有用能量得分开算。"]},{"id":"kitchen_mom","name":"林妈","svg":"kitchen_mom","persona":"能从电表最后一位看出谁忘关热水器的家庭预算官，每一度电都要花得明白","greet":["别只报多少瓦，开了多久、用了几度、花了几毛，都给我算全。","谁更快我不争，谁把同样一壶水烧开更省钱，账单说话。"],"done":["单位没混，效率也算进去了，这笔账我认。","会看电表就是会看能量去哪儿，今晚没有糊涂账。"]},{"id":"park_inspector","name":"严工","svg":"park_inspector","persona":"把安全系数挂在嘴边的游乐场检修员，张口就是半径、转速和允许值","greet":["先别急着尖叫，半径二十米、角速度零点一弧度每秒，参数报完再上车。","浪漫归浪漫，安全锁扣和向心条件一个都不能少。"],"done":["数据过线，锁扣复核，准许运行。","不错，你算的是安全边界，不是纸面上的热闹。"]},{"id":"park_kid","name":"豆豆","svg":"park_kid","persona":"每个项目都要坐第一排的尖叫小孩，害怕只有三秒，好奇心能撑一整晚","greet":["啊——还没开呢，我先练一下！","叔叔总说参数，我只想知道为什么倒过来还不会掉。"],"done":["原来尖叫不提供向心力，安全压杆才管用！","再来一圈！这次我连能量条一起看。"]},{"id":"power_electrician","name":"陈师傅","svg":"power_electrician","persona":"退休返聘的配电老法师，听一声跳闸就能猜出哪路在闹脾气","greet":["手电别晃表盘，先照脚下。电看不见，规矩得看清。","别急着合总闸。抢修不是跟黑夜比手快，是跟故障比谁更讲道理。"],"done":["记住这手：先全断，再逐路送。故障藏得住，电流藏不住。","灯亮不算本事，知道它为什么能稳稳亮着，才算把活干明白。"]},{"id":"power_property","name":"物业小林","svg":"power_property","persona":"刚入行的物业小哥，递工具很快，问题总能替大家问到点子上","greet":["陈师傅，我把工具箱全搬来了——虽然里面一半我还叫不上名。","小物你也来啦！我负责照亮，你负责把师傅说的翻译成人话。"],"done":["原来我那些蠢问题还真有用，至少以后不会见闸就合了。","你看，整栋楼一起亮了。今天这趟夜班，值！"]},{"id":"road_bus_driver","name":"老梁师傅","svg":"road_bus_driver","persona":"跑了二十年早班车的老司机，嘴碎但报站和刹车数据一样准","greet":["扶稳啊，车可以赶点，物理规律可不赶。","我这脚刹车踩多深，站台线比谁都清楚。"],"done":["算准了，车头停线，乘客不晃，三样都齐。","早班车最怕瞎估，带上正负号才叫老司机。"]},{"id":"road_classmate","name":"阿策","svg":"road_classmate","persona":"把每天上学都跑成计时赛的同班同学，书包里常备秒表","greet":["还剩八分钟！别问我为什么跑回来，公交卡落站台了。","你负责算，我负责把上学路跑成实验数据。"],"done":["以后谁再把平均速度和平均速率混着喊，我就把路线图拍桌上。","赶上了！这回不只没迟到，还把位移算明白了。"]},{"id":"wang_auntie","name":"王阿姨","svg":"wang_auntie","persona":"七楼情报站站长，买菜袋里总有实验器材","greet":["小物来得正好，这电梯一启动，我的秤就开始抢戏。","别光看楼层，脚底下也有物理新闻。"],"done":["懂了，秤没撒谎，是支持力在变。","今天这趟电梯，值回一节实验课。"]}],"QUESTS":[{"id":"q_bag_gravity","scene":"elevator","npc":"wang_auntie","title":"菜篮子的分量","tool":"spring","intro":[["wang_auntie","最后一个小忙：这袋米质量 5 kg，用 g=9.8 N/kg，它受到的重力是多少？"],["hero","质量用 kg，g 用 N/kg，直接代入重力公式。注意方向还要竖直向下。"]],"type":"choice","payload":{"q":"5 kg 米袋在地面附近受到的重力大小为？","opts":["4.9 N","49 N","50 kg","98 N"],"ans":1,"why":["小数点少进了一位：5×9.8=49。",null,"把质量和力混成了同一种量；重力单位应是 N。","把质量误用了 10 kg，题目给的是 5 kg。"]},"sim":null,"explain":"G=mg=5 kg×9.8 N/kg=49 N，方向竖直向下。弹簧测力计静止提着米袋时，示数也约为 49 N。","formulaRef":["重力"],"difficulty":1,"reward":{"exp":15,"item":"重力方向便签"}},{"id":"q_court_basket_shot","scene":"court","npc":"court_coach","title":"三分线外调到空心","tool":"protractor","intro":[["court_coach","出手点高 2.0 m，篮筐中心高 3.05 m、水平距离 6.5 m，角度先定 50°。把初速度调到球真正穿过篮筐。"],["hero","角度决定分速度比例，速度太小够不着，太大又会飞过；模拟显示命中才算。"]],"type":"slider","payload":{"label":"篮球出手初速度","min":6,"max":11,"step":0.1,"unit":"m/s","target":{"min":8.6,"max":8.7},"whyLow":"出手速度偏小：50° 下篮球在到达 6.5 m 前就掉到篮筐下方，射程和高度都不够。","whyHigh":"出手速度偏大：篮球到篮筐位置时仍过高或飞得太远，会从篮圈上方越过。"},"sim":{"model":"projectile","params":{"v0":8.65,"angle":50,"h0":2,"target":{"x":6.5,"y":3.05,"r":0.3}},"show":"50°、8.65 m/s 的篮球飞向 6.5 m 外、3.05 m 高的篮筐；轨迹真正穿过篮圈才算命中"},"explain":"斜抛时把初速度分成水平的 v₀cosθ 与竖直的 v₀sinθ：x=v₀cosθ·t，y=h₀+v₀sinθ·t−½gt²。固定 50° 后，约 8.65 m/s 能让球在 x=6.5 m 时经过 3.05 m 高的篮筐。","formulaRef":[],"difficulty":3,"reward":{"exp":45,"item":"空心入网徽章"}},{"id":"q_court_components","scene":"court","npc":"court_coach","title":"一颗球，两套分工","tool":"protractor","intro":[["court_coach","球只飞出一条轨迹，为什么你们总说它同时做两种运动？"],["hero","因为水平和竖直互不耽误。把每个方向的规律和结果配起来。"]],"type":"match","payload":{"pairs":[["水平方向","匀速运动，x=v₀t"],["竖直方向","自由落体，y=½gt²"],["飞行时间","只由下落高度 h 决定"],["落点速度","水平、竖直分速度用勾股合成"]]},"sim":null,"explain":"平抛运动的水平方向没有加速度，速度保持 v₀；竖直方向初速度为零、加速度为 g。两套运动共用同一个时间 t，最后再把位置或速度分量合成。","formulaRef":["平抛·水平方向","平抛·竖直方向","平抛·飞行时间","平抛·落点速度"],"difficulty":2,"reward":{"exp":25,"item":"水平竖直分工牌"}},{"id":"q_court_flight_time","scene":"court","npc":"court_coach","title":"快球会晚落地吗","tool":"tape","intro":[["court_coach","从同样高的看台边水平扔两颗球，一颗更快。先预测：快球是不是在空中待得更久？"],["hero","先把水平和竖直运动拆开。两颗球的竖直初速度都为零，下落高度也相同。"]],"type":"tf","payload":{"q":"从同一高度水平抛出两颗球，水平初速度更大的球飞行时间更长","a":false,"whyWrong":"把水平快慢混进了竖直下落：飞行时间 t=√(2h/g) 只由高度 h 决定，水平初速度只改变射程。"},"sim":{"model":"projectile","params":{"v0":6,"angle":0,"h0":2,"target":{"x":3.83,"y":0,"r":0.25}},"show":"篮球从 2 m 高处平抛：竖直方向按自由落体下落，增大水平速度只会把落点推远"},"explain":"平抛可拆成水平方向的匀速运动 x=v₀t，以及竖直方向的自由落体 y=½gt²。落地时 y=h，因此 t=√(2h/g)，和水平初速度 v₀ 无关。这正是同高平抛最反直觉的一点。","formulaRef":["平抛·水平方向","平抛·竖直方向","平抛·飞行时间"],"difficulty":2,"reward":{"exp":30,"item":"同高同时落地预测卡"}},{"id":"q_court_golden_exchange","scene":"court","npc":"court_astronomy","title":"不知道地球质量也能算","tool":null,"intro":[["court_astronomy","算卫星速度却没给地球质量 M，题目是不是漏印了？"],["hero","没漏。地表重力近似由万有引力提供，可以用黄金代换把 GM 换成我们熟悉的量。"]],"type":"blank","payload":{"fname":"黄金代换","blank":"gR²","opts":["gR²","g/R²","gR","GR²"],"ans":0},"sim":null,"explain":"地表质量 m 满足 GMm/R²≈mg，约去 m 得 GM=gR²。这就是黄金代换：没有地球质量 M 时，可用地表重力加速度 g 和地球半径 R 替代 GM。","formulaRef":["黄金代换","万有引力定律"],"difficulty":2,"reward":{"exp":30,"item":"GM 黄金代换卡"}},{"id":"q_court_newton_cannon","scene":"court","npc":"court_astronomy","title":"把篮球扔到掉不下来","tool":null,"intro":[["court_astronomy","牛顿想象在高山顶架一门大炮：炮弹越快，落地点越远。扔得够快，它就一直绕着地球掉。"],["hero","也就是地面一边弯下去，炮弹一边自由落下，却总也碰不到地面。近地圆轨道的关键速度是多少？"],["court_astronomy","记住那句：扔得够快就掉不下来。"]],"type":"choice","payload":{"q":"忽略空气阻力，物体在地面附近成为近地卫星所需的第一宇宙速度约为？","opts":["7.9 m/s","7.9 km/s","11.2 km/s","3.0×10⁵ km/s"],"ans":1,"why":["单位小了 1000 倍：7.9 m/s 只是一次普通投掷，远不足以环绕地球。",null,"11.2 km/s 是第二宇宙速度量级，不是近地圆轨道的第一宇宙速度。","这是光速量级，把卫星速度和电磁波速度混在了一起。"]},"sim":null,"explain":"第一宇宙速度 v₁=√(gR)≈7.9 km/s，是最小发射速度、也是最大环绕速度。牛顿大炮说明：速度足够大时，物体仍在重力作用下不断下落，但地球表面也以同样趋势弯离，于是形成环绕。","formulaRef":["第一宇宙速度"],"difficulty":2,"reward":{"exp":30,"item":"牛顿大炮思想卡"}},{"id":"q_court_orbit_steps","scene":"court","npc":"court_astronomy","title":"从引力排到环绕速度","tool":null,"intro":[["court_astronomy","篮球的抛物线看完了，来把卫星圆轨道的推导顺序排好。"],["hero","先找谁提供向心力，再约去共同量，最后才做地表的黄金代换。"]],"type":"order","payload":{"items":["得到 v=√(GM/r)；近地面再用 GM=gR² 得 v₁=√(gR)","写出地球对卫星的万有引力 F=GMm/r²","令万有引力提供向心力：GMm/r²=mv²/r","约去卫星质量 m，并整理出 v²=GM/r"],"ans":[1,2,3,0]},"sim":null,"explain":"卫星做圆周运动时，万有引力充当向心力。由 GMm/r²=mv²/r 可得 v=√(GM/r)，说明轨道越高，环绕速度越小。近地轨道取 r≈R，再用 GM=gR²，就得到 v₁=√(gR)≈7.9 km/s。","formulaRef":["万有引力定律","环绕速度","黄金代换","第一宇宙速度"],"difficulty":3,"reward":{"exp":40,"item":"近地轨道推导卷"}},{"id":"q_elevator_scale","scene":"elevator","npc":"wang_auntie","title":"体重秤为什么突然加班","tool":"scale","intro":[["wang_auntie","我站着没动，电梯一启动，秤上的数字倒先蹿高了。它是不是想多收我几斤？"],["hero","秤读的是支持力对应的视重。我们调一下向上的加速度，看看数字怎么变。"],["wang_auntie","行，今天让它当一次物理仪器。"]],"type":"slider","payload":{"label":"电梯向上加速度","min":-3,"max":4,"step":0.2,"unit":"m/s²","target":{"min":1.8,"max":2.2},"whyLow":"加速度偏小或向下：支持力不会达到这次明显超重的读数。只看加速度方向，别被速度方向带跑。","whyHigh":"加速度调得太大：N=m(g+a)，体重秤会比目标读数高出一截。"},"sim":{"model":"uniform","params":{"v0":0,"a":2,"dur":3},"show":"向上加速时，轿厢位移和 v–t 图同步变化，秤的支持力随加速度增大"},"explain":"电梯向上加速时，合力向上，所以 N−mg=ma，得到 N=m(g+a)。变大的是支持力，也就是视重；人的重力 mg 没有变化。","formulaRef":["超重","牛顿第二定律","重力"],"difficulty":2,"reward":{"exp":30,"item":"超重失重现象卡"}},{"id":"q_kitchen_appliance_power","scene":"kitchen","npc":"kitchen_dad","title":"水壶功率不是看个头","tool":"multimeter","intro":[["kitchen_dad","这只水壶不大，功率肯定也小。铭牌掉了，量到电压 220 V、电流约 9.1 A，你来补公式。"],["hero","用电器的电功率由电压和电流共同决定，外壳大小不能当测量值。"],["kitchen_dad","行，万用表说话，锅铲先闭嘴。"]],"type":"blank","payload":{"fname":"电功率","blank":"UI","opts":["UI","UIt","I²Rt","W/t²"],"ans":0},"sim":{"model":"circuit","params":{"V":220,"r0":0.2,"branches":[{"R":24.2,"sw":true},{"R":48.4,"sw":false}]},"show":"闭合水壶支路，观察 220 V 家庭电路中的支路电流与发热亮度"},"explain":"电功率 P=UI。水壶工作时 P≈220 V×9.1 A≈2000 W，也就是约 2.0 kW。功率表示单位时间内消耗电能的快慢，不能凭电器体积判断。","formulaRef":["电功率"],"difficulty":1,"reward":{"exp":20,"item":"水壶铭牌补丁"}},{"id":"q_kitchen_boil_time","scene":"kitchen","npc":"kitchen_dad","title":"烧水时间对赌","tool":"stopwatch","intro":[["kitchen_dad","水壶给水的有用加热功率按 2.1 kW 算，要输入 420 kJ 热量。我押三分钟烧好。"],["hero","用 P=W/t 反推时间，先把 kW 和 kJ 的千倍同时约掉。"],["kitchen_dad","秒表摆上，差十秒以内算你赢。"]],"type":"slider","payload":{"label":"预计烧水时间","min":100,"max":400,"step":5,"unit":"s","target":{"min":195,"max":205},"whyLow":"时间估得过短：t=W/P=420 kJ÷2.1 kW=200 s，不能只看功率大就随意压缩时间。","whyHigh":"时间估得过长：把 420 kJ 与 2.1 kW 统一单位后相除是 200 s，不需要再额外乘 60。"},"sim":null,"explain":"功率定义式 P=W/t，所以 t=W/P=420 000 J÷2100 W=200 s，约 3 分 20 秒。功率表示做功或能量转化的快慢，同样能量下功率越大，用时越短。","formulaRef":["功率（定义式）"],"difficulty":2,"reward":{"exp":30,"item":"烧水对赌秒表"}},{"id":"q_kitchen_energy_match","scene":"kitchen","npc":"kitchen_mom","title":"热量都跑去哪儿了","tool":"wattmeter","intro":[["kitchen_mom","水壶、燃气灶、浴室热水器都在加热，可账单不一样。先把每个量在效率公式里的位置配清楚。"],["hero","输入能量不全是有用能量，壶身、空气和烟气带走的都属于损失。"]],"type":"match","payload":{"pairs":[["水吸收的热量","有用能量 E有"],["电表记录的水壶耗电量","总输入能量 E总"],["壶身和空气吸收的热量","损失能量"],["有用能量与总输入能量之比","能量转化效率 η"]]},"sim":null,"explain":"效率 η=E有/E总。烧水时，水吸收的热量是有用能量；电能或燃气化学能是总输入；散到壶身、空气和烟气中的能量属于损失，所以实际效率一定小于 100%。","formulaRef":["能量转化效率","能量守恒定律"],"difficulty":1,"reward":{"exp":25,"item":"家庭能量流向图"}},{"id":"q_kitchen_heater_value","scene":"kitchen","npc":"kitchen_mom","title":"水壶还是热水器划算","tool":"wattmeter","intro":[["kitchen_mom","同样给水 3.6 MJ 热量：水壶效率 90%，电价 0.60 元每度；燃气热水器效率 75%，燃气 36 MJ 每立方米、3 元每立方米。"],["hero","先用效率倒推各自输入能量，再换成电量或燃气体积，最后才比较钱。"],["kitchen_mom","只比效率会漏掉能源单价，这回把两本账合起来。"]],"type":"choice","payload":{"q":"按题给价格，哪种方式完成这次加热更省钱？","opts":["电水壶，约 0.24 元","电水壶，约 0.67 元，比燃气便宜","燃气热水器，约 0.40 元，比水壶便宜","两者都恰好 0.60 元"],"ans":2,"why":["把有用热量 3.6 MJ 直接按电价计费，漏除了 90% 效率，也没有正确换成 kW·h。","水壶费用约 0.67 元算对了，但燃气热水器约 0.40 元，比较结论反了。",null,"把能源单价误当成固定总价；两种设备的输入能量和计价单位都不同。"]},"sim":null,"explain":"水壶输入能量 3.6÷0.90=4.0 MJ=1.11 kW·h，费用约 1.11×0.60=0.67 元。燃气热水器需燃气 3.6÷(0.75×36)=0.133 m³，费用约 0.133×3=0.40 元。本题价格下燃气更省；现实选择还要考虑安全、待机损耗和用水量。","formulaRef":["能量转化效率","电功"],"difficulty":3,"reward":{"exp":40,"item":"热水成本算盘"}},{"id":"q_kitchen_joule_heat","scene":"kitchen","npc":"kitchen_dad","title":"电流翻倍热量翻几倍","tool":null,"intro":[["kitchen_dad","同一根电热丝，时间不变，电流翻倍，发热量当然也只翻倍。很线性嘛。"],["hero","先别被‘翻倍’带走，焦耳定律里电流可是带平方的。"]],"type":"tf","payload":{"q":"同一电热丝的电阻不变、通电时间不变，电流变为 2 倍时产生的热量也变为 2 倍","a":false,"whyWrong":"漏掉了焦耳定律中的平方：Q=I²Rt，电流变为 2 倍，热量应变为 2²=4 倍。"},"sim":null,"explain":"焦耳定律 Q=I²Rt。在 R、t 不变时，Q 与 I²成正比，因此电流翻倍，发热量变为 4 倍。大电流会让线路迅速发热，这也是家庭电路不能超负荷的原因。","formulaRef":["焦耳定律"],"difficulty":1,"reward":{"exp":20,"item":"电流平方警示贴"}},{"id":"q_kitchen_one_unit_bill","scene":"kitchen","npc":"kitchen_mom","title":"半小时烧掉几毛钱","tool":"wattmeter","intro":[["kitchen_mom","2.0 kW 的电水壶累计开了半小时，电价按 0.60 元每度。用了几度、花了多少，两个数都要对。"],["hero","生活账用 kW 和 h 最顺手：1 度就是 1 kW·h。"],["kitchen_mom","别把千瓦时写成千瓦，电表记的是能量，不是功率。"]],"type":"choice","payload":{"q":"这只 2.0 kW 水壶累计工作 0.5 h，电费是多少？","opts":["用电 1 度，电费 0.60 元","用电 0.5 度，电费 0.30 元","用电 2 度，电费 1.20 元","用电 1000 度，电费 600 元"],"ans":0,"why":[null,"只看了 0.5 h，漏乘水壶的 2.0 kW 功率。","把半小时误当成 1 h；2.0 kW×0.5 h 才是 1 kW·h。","把 W 与 kW 的千倍换算方向弄反了，2.0 kW 不是 2000 kW。"]},"sim":{"model":"circuit","params":{"V":220,"r0":0.3,"branches":[{"R":24.2,"sw":true},{"R":44,"sw":true},{"R":88,"sw":false}]},"show":"水壶与厨房电器并联工作：总电流随开启支路增加，电表累计各支路消耗的电能"},"explain":"电功 W=Pt=2.0 kW×0.5 h=1.0 kW·h，也就是 1 度电；电费为 1.0×0.60=0.60 元。1 度=1 kW·h=3.6×10⁶ J。","formulaRef":["电功","电功率"],"difficulty":2,"reward":{"exp":30,"item":"一度电账单"}},{"id":"q_overweight_truth","scene":"elevator","npc":"wang_auntie","title":"超重不是突然长胖","tool":null,"intro":[["wang_auntie","刚才秤变重，那我受到的重力是不是也跟着变大？"],["hero","这是最容易被秤带偏的一步。判断前，把重力和支持力分开。"]],"type":"tf","payload":{"q":"超重时物体所受的重力变大了","a":false,"whyWrong":"混淆了重力与视重：超重时 mg 不变，变大的是秤给人的支持力 N。"},"sim":null,"explain":"人在同一地点质量不变，g 近似不变，所以重力 G=mg 不变。所谓超重，只是支持力 N 大于重力，秤据此给出了更大的视重。","formulaRef":["重力","超重"],"difficulty":1,"reward":{"exp":15,"item":"视重辨析贴纸"}},{"id":"q_park_brake_work","scene":"park","npc":"park_inspector","title":"刹车段做了多少功","tool":"stopwatch","intro":[["park_inspector","测试车连乘客共 500 kg，进刹车段是 20 m/s，出来降到 10 m/s。合力做功报数。"],["hero","不用追每一种阻力，动能定理直接看初末速度。负号还会告诉我们合力在抽走动能。"]],"type":"choice","payload":{"q":"刹车过程中合力对车做的总功是多少？","opts":["−75 000 J","+75 000 J","−25 000 J","+100 000 J"],"ans":0,"why":[null,"动能减少，合力做功必须为负；不能只算大小不判能量变化方向。","把速度差直接代入了动能；动能与速度平方成正比。","只用了初动能的一部分，漏掉了末动能并且符号也错误。"]},"sim":null,"explain":"由动能定理，W总=½mv₂²−½mv₁²=½×500×(10²−20²) J=−75 000 J。负功使车的动能减少，速度随之降低。","formulaRef":["动能定理","动能"],"difficulty":2,"reward":{"exp":30,"item":"刹车负功记录单"}},{"id":"q_park_coaster_height","scene":"park","npc":"park_inspector","title":"过山车起点高度闸","tool":"energymeter","intro":[["park_inspector","试车轨道最高点离参考面 8 m，先忽略摩擦。起点放多高，车才能带着速度越过坡顶？"],["hero","能量条会把重力势能换成动能。起点只到 8 m，理论上到顶刚好停住，还不能算越过。"],["park_inspector","安全测试不收‘刚好’，滑块至少留出 1 m 的高度余量。"]],"type":"slider","payload":{"label":"过山车起点高度","min":4,"max":14,"step":1,"unit":"m","target":{"min":9,"max":14},"whyLow":"起点低于 8 m 时总机械能不够到坡顶；正好 8 m 时到顶速度为 0，也不能继续越过。至少调到 9 m 留出动能。","whyHigh":"高度已经超过本次测试上限；安全判断不是越高越好，要在给定 4～14 m 范围内选满足过顶条件的值。"},"sim":{"model":"energy","params":{"h0":10,"v0":0,"mu":0,"track":[[0,10],[3,0],[5,4],[7,8],[9,4],[12,0]]},"show":"起点 10 m 的试车：势能条下降、动能条上升，到 8 m 坡顶仍保留动能，因此能够过顶"},"explain":"忽略摩擦时机械能守恒：mgh₀=mgh顶+½mv顶²。要真正越过 8 m 坡顶，v顶必须大于 0，所以 h₀要大于 8 m；滑块最小整米答案是 9 m。能量条减少的是重力势能，增加的是动能。","formulaRef":["机械能守恒定律","重力势能","动能"],"difficulty":2,"reward":{"exp":35,"item":"过顶能量条"}},{"id":"q_park_energy_truth","scene":"park","npc":"park_inspector","title":"有摩擦还能守恒吗","tool":"energymeter","intro":[["park_inspector","正式运行有轮轴摩擦和空气阻力。豆豆说只要最后没停，机械能就一定守恒。"],["hero","总能量守恒不等于机械能守恒。看看有没有机械能转化成内能。"]],"type":"tf","payload":{"q":"过山车受到摩擦阻力做负功时，动能与重力势能之和仍保持不变","a":false,"whyWrong":"混淆了总能量守恒与机械能守恒：摩擦把一部分机械能转化为内能，所以动能与重力势能之和会减少。"},"sim":null,"explain":"只有重力或弹力做功时，机械能才守恒。实际过山车受摩擦和空气阻力，机械能会转化为内能；包含内能在内的总能量依然守恒。","formulaRef":["机械能守恒定律","能量守恒定律"],"difficulty":1,"reward":{"exp":20,"item":"能量去向标签"}},{"id":"q_park_ferris_speed","scene":"park","npc":"park_inspector","title":"摩天轮外圈更赶风","tool":"tape","intro":[["park_inspector","摩天轮半径 20 m，匀速转动时角速度是 0.10 rad/s。最外圈座舱的线速度报一下。"],["hero","同一轮盘各点角速度相同，但离轴越远，一秒扫过的弧长越长。"],["park_inspector","对，先把半径量准，再用 v=ωr，别拿角速度直接当速度。"]],"type":"blank","payload":{"fname":"线速度与角速度","blank":"ωr","opts":["ωr","2πr","v²/r","mω²r"],"ans":0},"sim":{"model":"circular","params":{"r":20,"omega":0.1,"mode":"vertical"},"show":"摩天轮匀速转动：座舱的瞬时速度沿切线，线速度大小为 2.0 m/s"},"explain":"同轴转动时各座舱角速度相同。最外圈座舱 v=ωr=0.10 rad/s×20 m=2.0 m/s；半径越大，同样时间内走过的弧长越长，线速度越大。","formulaRef":["线速度与角速度","角速度"],"difficulty":1,"reward":{"exp":20,"item":"摩天轮参数牌"}},{"id":"q_park_flying_chairs","scene":"park","npc":"park_kid","title":"飞椅把人甩向哪儿","tool":"protractor","intro":[["park_kid","飞椅一转，我明明觉得自己要飞出去，绳子为什么总斜着拽我？"],["hero","你需要的是指向转轴的合力。把看到的现象、转速和半径变化一一配上。"],["park_kid","好，我先不闭眼，看看箭头到底指哪儿。"]],"type":"match","payload":{"pairs":[["向心加速度方向","始终指向圆心"],["角速度变为 2 倍","向心加速度变为 4 倍"],["角速度不变、半径变为 2 倍","向心加速度变为 2 倍"],["飞椅的向心力来源","重力与绳子拉力的合力"]]},"sim":{"model":"circular","params":{"r":6,"omega":0.8,"mode":"horizontal"},"show":"旋转飞椅俯视轨迹：向心力箭头始终朝圆心，a=ω²r=3.84 m/s²"},"explain":"向心加速度 a=v²/r=ω²r，方向始终指向圆心。角速度翻倍时 a 变为 4 倍；同一角速度下半径翻倍时 a 变为 2 倍。向心力是合力的效果名称，这里由重力和绳子拉力的合力提供。","formulaRef":["向心加速度","向心力"],"difficulty":2,"reward":{"exp":30,"item":"飞椅圆心箭头"}},{"id":"q_park_loop_top","scene":"park","npc":"park_kid","title":"倒挂最高点为什么不掉","tool":null,"intro":[["park_kid","到圆环最高点时我整个人都倒过来了，为什么没有掉下来？是速度把我托住了吗？"],["hero","速度不是力。最高点的圆心在下方，先找哪些真实的力能共同提供向下的向心力。"]],"type":"choice","payload":{"q":"过山车在竖直圆环最高点仍贴着轨道运动，正确的受力解释是？","opts":["速度向前产生一个向上的托力","重力和轨道支持力的合力指向下方圆心","重力在最高点突然消失","离心力把车压在上方轨道上"],"ans":1,"why":["把速度当成了力；速度描述运动状态，不能提供托力。",null,"重力始终存在，最高点恰好能帮助提供指向圆心的合力。","惯性参考系中不需要虚构离心力；应分析重力与轨道支持力的合力。"]},"sim":null,"explain":"最高点的圆心在车的下方，重力 mg 与轨道支持力 N 都可指向圆心，满足 mg+N=mv²/r。极限情况下 N=0，仍需 v≥√(gr)；有足够速度且轨道约束正常，车就不会脱离轨道。","formulaRef":["向心力","牛顿第二定律","重力"],"difficulty":2,"reward":{"exp":30,"item":"最高点受力图"}},{"id":"q_power_ampere_meter","scene":"power","npc":"power_electrician","title":"老电表的一手绝活","tool":"compass","intro":[["power_property","陈师傅，电表里那小线圈为什么一通电就会转？我用右手比了半天，指头都快打结了。"],["power_electrician","这回得请左手。让磁场穿进掌心，四指跟电流走，大拇指就告诉你导线往哪儿受力。"],["hero","把左手上的三条线索一一配好，线圈转动的秘密就清楚了。"]],"type":"match","payload":{"pairs":[["磁场方向","垂直穿入左手掌心"],["电流方向","左手四指所指"],["安培力方向","左手大拇指所指"]]},"sim":null,"explain":"通电导线与磁场垂直时，安培力大小为 F=BIL；B、I 或有效长度 L 增大，力都会增大。方向用左手定则判断：磁感线穿入掌心，四指指电流，大拇指指安培力。线圈两侧电流方向相反，受到方向相反的一对安培力，于是产生转动效果，这就是电表和电动机的核心原理之一。","formulaRef":["安培力","磁感应强度（定义式）"],"difficulty":2,"reward":{"exp":30,"item":"陈师傅的左手口诀"}},{"id":"q_power_bird_wire","scene":"power","npc":"power_property","title":"灯亮了，鸟还站在线上","tool":null,"intro":[["narrator","故障支路隔离完毕。陈师傅握住总闸，小区楼顶那根高压线上，一只夜归的鸟安安稳稳地缩着脖子。"],["power_property","线的电势那么高，它怎么一点事没有？难道鸟爪自带绝缘手套？"],["power_electrician","别只看一个点有多高，要看身体两端差多少。小物，替咱们把今天最后这道理讲亮。"]],"type":"choice","payload":{"q":"鸟只站在同一根高压线上时通常没事，关键原因是什么？","opts":["鸟的两只脚在同一导线上，跨越的电势差很小","鸟没有电荷，所以任何电场都对它不起作用","高压线只有电压，没有电流","鸟的羽毛能承受任意高的电压"],"ans":0,"why":[null,"物体整体近似电中性不等于内部没有电荷；危险取决于身体两端电势差引起的电流。","正常输电线既有电压也有电流；把“高电势”误当成“没有电流”了。","羽毛不是无限绝缘体；若鸟同时跨接两根线或线路与地面，仍会因巨大电势差而危险。"]},"sim":null,"explain":"电势高不等于身体两端电势差大。鸟的两只脚落在同一根导线上，距离很近，近似处于等电势，跨过身体的 U 很小。由 U=W/q 或 W=qU 可知，单位电荷跨过身体时电场力做功很小；再由 I=U/R 可知，在身体电阻一定时电流也很小。若同时碰到另一根线或接地物体，身体两端出现巨大电势差，就会非常危险。陈师傅合上最后一把闸，电流回到该走的路上，整栋楼的窗灯一层层亮了起来。","formulaRef":["电势差","静电力做功","欧姆定律"],"difficulty":2,"reward":{"exp":35,"item":"一天终章灯牌"}},{"id":"q_power_ohm_lock","scene":"power","npc":"power_property","title":"表笔锁定嫌疑支路","tool":"multimeter","intro":[["power_property","师傅说这路电阻小得离谱。我记得电流等于电压除以什么，偏偏最要紧那个字母卡住了。"],["power_electrician","别背成一团。电压是推力，电阻是拦路的，拦得越少，电流越大。"],["hero","把欧姆定律的缺口补上，嫌疑支路就锁定了。"]],"type":"blank","payload":{"fname":"欧姆定律","blank":"R","opts":["R","q","t","BIL"],"ans":0},"sim":null,"explain":"欧姆定律是 I=U/R。同样接在 220 V 电源上，支路电阻 R 越小，电流 I 越大。正常用电器不会呈现接近零的电阻；测得异常低阻时，应保持断电继续查线，绝不能反复强行合闸。","formulaRef":["欧姆定律"],"difficulty":1,"reward":{"exp":20,"item":"欧姆定律表笔夹"}},{"id":"q_power_parallel_hunt","scene":"power","npc":"power_electrician","title":"逐路送电，揪出短路","tool":"multimeter","intro":[["power_electrician","总闸一推就跳，不能硬顶。先全断、验电，断电测完电阻再一条条送。"],["power_property","为什么不把它们串成一串？哪路坏了，不就大家一起歇着？"],["hero","正因为家里要互不影响、各得 220 V，支路才并联；送电由陈师傅操作，我们退到安全线外观察。"]],"type":"order","payload":{"items":["测出异常低阻后，立即隔离该支路并挂牌，禁止送电","表笔撤离带电区域后，由陈师傅合上总闸","先断开总闸和全部支路闸刀，验电确认断电","断电状态用多用电表测各支路电阻，区分正常与异常支路","其他人退到安全线外，陈师傅只逐个合上已确认正常的支路"],"ans":[2,3,0,1,4]},"sim":{"model":"circuit","params":{"V":220,"r0":0.8,"branches":[{"R":880,"sw":true},{"R":44,"sw":false},{"R":0.6,"sw":true}]},"show":"闸刀开合对照：正常并联支路互不影响；若误把低阻短路接入，总电流会突然暴增，真实抢修绝不能这样尝试"},"explain":"家庭用电器并联，所以各支路两端电压相同，关掉一路不影响别路。排查时先全断并验电，在断电状态用多用电表电阻挡筛查；发现异常低阻后立即隔离挂牌。撤走表笔后，只由专业电工恢复已确认正常的支路，绝不给可疑短路送电。演示中可看出：若低阻支路被接入，电流会按 I=U/R 急剧增大。普通万用表电流挡绝不能直接串入总路测短路电流。并联越多，总电阻越小；但正常负载有额定电阻，短路支路电阻接近零，危险程度完全不同。","formulaRef":["欧姆定律","串联电阻","并联电阻"],"difficulty":3,"reward":{"exp":45,"item":"逐路送电检修牌"}},{"id":"q_power_static_handle","scene":"power","npc":"power_property","title":"门把手先打了个招呼","tool":null,"intro":[["narrator","夜风又干又冷。小林刚摸上配电房的金属门把手，指尖啪地闪了一下。"],["power_property","哎哟！门把手也漏电？我今晚是不是得隔着袖子开门？"],["power_electrician","先别冤枉门把手。你一路蹭着化纤外套走来，身上攒的电荷正等着找地方跑。"]],"type":"tf","payload":{"q":"手还没完全碰到门把手就只闪了一次火花，这可用局部电场增强、空气击穿解释，不能据此断定把手接上了 220 V","a":true,"whyWrong":"忽略了静电放电的关键现象：摩擦使电荷转移并积累，手靠近金属时局部场强足够大，空气会短暂击穿并在电荷重新分布后停止。"},"sim":null,"explain":"摩擦没有创造电荷，只让电荷发生转移。积累的电荷会产生电场，同号相斥、异号相吸，点电荷间作用力满足 F=kq₁q₂/r²；试探电荷受到的力还可用 E=F/q 描述。手靠近导体时局部场强很大，空气被击穿，电荷瞬间转移，于是只听见短促的“啪”，这和家庭电路持续漏电不是一回事。","formulaRef":["库仑定律","电场强度（定义式）"],"difficulty":1,"reward":{"exp":20,"item":"静电火花贴纸"}},{"id":"q_power_trip_load","scene":"power","npc":"power_electrician","title":"到底谁把总闸挤下去了","tool":"wattmeter","intro":[["power_property","短路线修好了，闸怎么还是偶尔跳？监控室说跳之前，三台大功率设备正好一起开。"],["power_electrician","原来已有 3000 W 负载，又开了一台 1500 W 电暖器。总闸额定 20 A，电压 220 V。算算它最多扛多少。"],["hero","电暖器不是单独作案，它只是把总功率推过上限的最后一把。"]],"type":"slider","payload":{"label":"20 A 总闸允许的总功率","min":3000,"max":5500,"step":100,"unit":"W","target":{"min":4400,"max":4400},"whyLow":"把功率上限估低了：用 P=UI，220 V×20 A=4400 W，不要只盯着原有的 3000 W 负载。","whyHigh":"忽略了总闸的 20 A 额定电流：超过 4400 W 时 I=P/U 会超过 20 A，导线发热与 I² 成正比，不能靠闸硬扛。"},"sim":{"model":"circuit","params":{"V":220,"r0":0,"branches":[{"R":24.2,"sw":true},{"R":32.27,"sw":true},{"R":48.4,"sw":true}]},"show":"三路大功率电器并联后总电流相加；最后接入的电暖器让总功率约达 4500 W，越过 20 A 总闸的承受线"},"explain":"总闸功率上限约为 P=UI=220 V×20 A=4400 W。原有 3000 W 再加 1500 W 电暖器，总功率达到 4500 W，总电流约 20.5 A，超过额定值。电暖器是“最后一根稻草”，根因是同时用电的总功率过大。焦耳定律 Q=I²Rt 还说明电流稍一增大，线路发热会按电流平方加剧，所以总闸跳开是在保护导线。","formulaRef":["电功率","焦耳定律"],"difficulty":2,"reward":{"exp":35,"item":"总功率警戒线"}},{"id":"q_push_crate","scene":"elevator","npc":"courier_zhou","title":"纸箱到底听谁的","tool":"spring","intro":[["courier_zhou","这箱子 20 kg，我水平推 60 N。地面动摩擦因数 0.20，咱按 g=10 m/s² 算，它能有多大加速度？"],["hero","先让弹簧测力计盯住推力，再把摩擦力从合力里扣掉。"],["courier_zhou","懂了，不能拿 60 N 直接除质量，地面还在暗中使劲。"]],"type":"choice","payload":{"q":"纸箱已经滑动，水平加速度是多少？","opts":["0 m/s²","1 m/s²","2 m/s²","3 m/s²"],"ans":1,"why":["把推力和摩擦力误当成完全平衡了；先算 f=μN=40 N。",null,"直接用了摩擦力除质量，漏掉了 60 N 推力。","直接用 60 N÷20 kg，忘了扣除滑动摩擦力。"]},"sim":{"model":"uniform","params":{"v0":0,"a":1,"dur":3},"show":"净力 20 N 推着 20 kg 纸箱做匀加速运动，v–t 图斜率为 1"},"explain":"水平面上 N=mg=200 N，滑动摩擦力 f=μN=40 N。合力 F合=60−40=20 N，由 F合=ma 得 a=1 m/s²。","formulaRef":["滑动摩擦力","牛顿第二定律"],"difficulty":2,"reward":{"exp":30,"item":"摩擦侦探徽章"}},{"id":"q_road_brake_line","scene":"road","npc":"road_bus_driver","title":"车头精准压站台线","tool":"tape","intro":[["road_bus_driver","车速 12 m/s，离站台线 18 m。给我一个恒定刹车加速度，要求到线速度刚好变成零。"],["hero","题里没给时间，用 v²−v₀²=2ax 最省事。向前为正，刹车的 a 必须带负号。"],["road_bus_driver","调吧，少一点冲线，多一点又停早；车头压线才算。"]],"type":"slider","payload":{"label":"公交车刹车加速度","min":-8,"max":-1,"step":0.5,"unit":"m/s²","target":{"min":-4.1,"max":-3.9},"whyLow":"负得太多，减速过猛：停车距离小于 18 m，车会在站台线前提前停下。","whyHigh":"加速度绝对值太小：18 m 内速度还没降到零，车头会越过站台线。"},"sim":{"model":"uniform","params":{"v0":12,"a":-4,"dur":3},"show":"公交车以 −4 m/s² 匀减速，3 s 后速度为 0，位移恰为 18 m；v–t 图下降到时间轴"},"explain":"令前进方向为正，末速度 v=0。代入 v²−v₀²=2ax：0−12²=2a×18，得 a=−4 m/s²。再由 v=v₀+at 可验得停车时间 3 s，位移也正好是 18 m。","formulaRef":["速度—位移关系","速度—时间关系"],"difficulty":3,"reward":{"exp":40,"item":"精准刹停徽章"}},{"id":"q_road_crosswalk_move","scene":"road","npc":"road_classmate","title":"斑马线前的四秒","tool":"tape","intro":[["road_classmate","车经过路灯时速度 2 m/s，随后以 1 m/s² 加速 4 秒。它离斑马线还有多远才安全？"],["hero","按位移—时间关系算。把已知量、两段位移和总位移排成正确顺序。"]],"type":"order","payload":{"items":["相加得到 x=8 m+8 m=16 m","代入 v₀=2 m/s、a=1 m/s²、t=4 s","计算 v₀t=8 m 与 ½at²=8 m"],"ans":[1,2,0]},"sim":null,"explain":"先把初速度、加速度和时间代入 x=v₀t+½at²，再分别算出 8 m 和 8 m，最后得到位移 16 m。别把末速度 v=6 m/s 直接乘 4 秒，那会把整段都误当成末速度。","formulaRef":["位移—时间关系","速度—时间关系"],"difficulty":2,"reward":{"exp":25,"item":"斑马线测距条"}},{"id":"q_road_formula_dispatch","scene":"road","npc":"road_classmate","title":"赶时间公式调度台","tool":null,"intro":[["road_classmate","最后一分钟复盘！不同题干该叫哪条公式上车？"],["hero","先看已知量和所求量。不给时间的刹车题，千万别硬凑 t。"]],"type":"match","payload":{"pairs":[["已知 v₀、a、t，求末速度 v","v = v₀ + at"],["已知 v₀、a、t，求位移 x","x = v₀t + ½at²"],["刹车题不给 t，已知 v₀、v、x","v² − v₀² = 2ax"],["往返全程求平均速度","位移 Δx ÷ 总时间 Δt"]]},"sim":null,"explain":"公式不是越长越强，而是要避开未知量：有时间就用速度—时间或位移—时间关系；不含时间的刹车距离优先用速度—位移关系；平均速度永远抓住位移而不是路程。","formulaRef":["速度—时间关系","位移—时间关系","速度—位移关系","平均速度"],"difficulty":2,"reward":{"exp":30,"item":"早班公式调度牌"}},{"id":"q_road_green_start","scene":"road","npc":"road_bus_driver","title":"绿灯一亮就起步","tool":"stopwatch","intro":[["road_bus_driver","绿灯亮了，我从静止开始，保持 2 m/s² 加速 5 秒。末速度别靠感觉，公式里那块补上。"],["hero","初速度是零，速度每秒增加 2 m/s；再看动画里的 v–t 线是不是同样爬升。"]],"type":"blank","payload":{"fname":"速度—时间关系","blank":"at","opts":["at","v₀t","½at²","2ax"],"ans":0},"sim":{"model":"uniform","params":{"v0":0,"a":2,"dur":5},"show":"公交车从绿灯处匀加速起步：5 s 时 v=10 m/s，v–t 图为向上倾斜的直线"},"explain":"匀加速时 v=v₀+at。这里 v₀=0、a=2 m/s²、t=5 s，所以末速度 v=10 m/s；同时 x=v₀t+½at²=25 m。速度看斜率变化，位移看这 5 秒积累了多少。","formulaRef":["速度—时间关系","位移—时间关系"],"difficulty":1,"reward":{"exp":20,"item":"绿灯起步数据卡"}},{"id":"q_road_round_trip","scene":"road","npc":"road_classmate","title":"公交卡的折返跑","tool":"stopwatch","intro":[["road_classmate","我从站台向东跑 600 米，又折返 200 米拿公交卡，全程 100 秒。快，帮我把两个‘平均’分开！"],["hero","路线要算路程，起点到终点的有向变化才是位移。先别急着拿 800 除。"]],"type":"choice","payload":{"q":"这次折返跑的平均速度与平均速率分别是多少？","opts":["4 m/s 向东；8 m/s","8 m/s 向东；4 m/s","6 m/s 向东；6 m/s","0 m/s；8 m/s"],"ans":0,"why":[null,"把位移和路程对调了：位移是 600−200=400 m，路程是 600+200=800 m。","把单程 600 m 同时冒充位移和路程，漏掉了折返的 200 m。","只有回到原点位移才为 0；他最后仍在起点以东 400 m。"]},"sim":null,"explain":"向东取正，位移 Δx=600−200=400 m，所以平均速度为 400/100=4 m/s，方向向东；路程 s=600+200=800 m，所以平均速率为 800/100=8 m/s。平均速度是矢量，平均速率是标量。","formulaRef":["平均速度","平均速率"],"difficulty":2,"reward":{"exp":25,"item":"路线正负号贴纸"}},{"id":"q_road_vt_area","scene":"road","npc":"road_bus_driver","title":"v–t 图底下藏着什么","tool":null,"intro":[["road_bus_driver","刚才刹车图线从 12 降到 0。有人说图线和时间轴围起来的面积只是‘速度总和’，对吗？"],["hero","看清横轴是时间、纵轴是速度，速度乘时间的量纲就是位移。"]],"type":"tf","payload":{"q":"v-t 图象中，图线与时间轴围成的面积表示位移","a":true,"whyWrong":"把图象面积当成加速度或速度总和了：每个小时间段的 v·Δt 都是位移，累加后就是总位移。"},"sim":null,"explain":"v–t 图下方面积表示位移。刹车过程的图形是底为 3 s、高为 12 m/s 的三角形，面积 ½×3×12=18 m，恰好对应站台线前的位移；若图线在时间轴下方，面积要计负号。","formulaRef":["匀变速平均速度","位移—时间关系"],"difficulty":2,"reward":{"exp":25,"item":"v–t 面积透视卡"}},{"id":"q_spring_door","scene":"elevator","npc":"courier_zhou","title":"闭门器里的弹簧暗号","tool":"spring","intro":[["courier_zhou","楼道门一松手就自己关，里面那根弹簧越拉越难。公式里的关键一块你还记得吗？"],["hero","只要没有超过弹性限度，弹力和形变量成正比。把缺口补上就知道了。"]],"type":"blank","payload":{"fname":"胡克定律","blank":"kx","opts":["kx","mg","ma","μN"],"ans":0},"sim":null,"explain":"在弹性限度内，弹簧弹力 F=kx。k 是劲度系数，x 是相对原长的形变量，不是弹簧的总长度。","formulaRef":["胡克定律"],"difficulty":1,"reward":{"exp":20,"item":"弹簧暗号卡"}}]};

<script>
/* ===== src/sim.js ===== */
(() => {
  "use strict";
  const DT = 1 / 120, G = 9.8;
  const num = (v, d = 0) => Number.isFinite(+v) ? +v : d;
  const tick = t => Math.max(0, Math.floor(num(t) / DT + 1e-9) * DT);
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  function uniform(p, time) {
    const v0 = num(p.v0), a = num(p.a), dur = Math.max(DT, num(p.dur, 4));
    const t = clamp(time, 0, dur), x = v0 * t + a * t * t / 2, v = v0 + a * t;
    const curve = Array.from({ length: 25 }, (_, i) => {
      const ct = dur * i / 24;
      return { t: ct, v: v0 + a * ct };
    });
    return { model: "uniform", dt: DT, t, dur, x, v, a, progress: t / dur, curve, done: t >= dur };
  }

  function projectile(p, time) {
    const v0 = num(p.v0), angle = num(p.angle) * Math.PI / 180, h0 = num(p.h0);
    const vx = v0 * Math.cos(angle), vy0 = v0 * Math.sin(angle), flight = (vy0 + Math.sqrt(vy0 ** 2 + 2 * G * Math.max(0, h0))) / G;
    const t = clamp(time, 0, Math.max(DT, flight)), x = vx * t, y = Math.max(0, h0 + vy0 * t - G * t * t / 2);
    const target = p.target || { x: Infinity, y: Infinity, r: 0 };
    const points = Array.from({ length: 41 }, (_, i) => {
      const pt = flight * i / 40;
      return { x: vx * pt, y: Math.max(0, h0 + vy0 * pt - G * pt * pt / 2) };
    });
    const hit = points.some(pt => Math.hypot(pt.x - num(target.x), pt.y - num(target.y)) <= num(target.r));
    return { model: "projectile", dt: DT, t, x, y, vx, vy: vy0 - G * t, points, hit, done: t >= flight };
  }

  function circular(p, time) {
    const r = Math.max(.01, num(p.r, 1)), omega = num(p.omega, 1), theta = omega * time;
    const flat = p.mode === "horizontal" ? .42 : 1, x = r * Math.cos(theta), y = r * Math.sin(theta) * flat;
    return { model: "circular", dt: DT, t: time, x, y, theta, speed: Math.abs(omega * r), centripetal: omega * omega * r,
      force: { x: -omega * omega * x, y: -omega * omega * y }, mode: p.mode === "horizontal" ? "horizontal" : "vertical" };
  }

  function energy(p, time) {
    const track = Array.isArray(p.track) && p.track.length > 1 ? p.track.map(v => [num(v[0]), num(v[1])]) : [[0, 0], [1, 1]];
    const h0 = num(p.h0, track[0][1]), v0 = Math.max(0, num(p.v0)), mu = Math.max(0, num(p.mu));
    const segs = [], total = track.slice(1).reduce((sum, b, i) => {
      const a = track[i], len = Math.hypot(b[0] - a[0], b[1] - a[1]); segs.push(len); return sum + len;
    }, 0);
    const dist = clamp((v0 + Math.sqrt(Math.max(0, 2 * G * Math.max(0, h0 - track[track.length - 1][1])))) * time / 2, 0, total);
    let left = dist, i = 0; while (i < segs.length - 1 && left > segs[i]) left -= segs[i++];
    const ratio = segs[i] ? left / segs[i] : 0, a = track[i], b = track[i + 1];
    const x = a[0] + (b[0] - a[0]) * ratio, y = a[1] + (b[1] - a[1]) * ratio;
    const potential = G * Math.max(0, y), lost = mu * G * dist, kinetic = Math.max(0, v0 * v0 / 2 + G * h0 - potential - lost);
    const totalE = Math.max(.001, kinetic + potential + lost);
    return { model: "energy", dt: DT, t: time, x, y, speed: Math.sqrt(2 * kinetic), distance: dist, track,
      bars: { kinetic: kinetic / totalE, potential: potential / totalE, lost: lost / totalE }, done: dist >= total };
  }

  function circuit(p, time = 0) {
    const V = num(p.V), r0 = Math.max(0, num(p.r0)), branches = (p.branches || []).map(b => ({ R: Math.max(.001, num(b.R, 1)), sw: b.sw !== false }));
    const active = branches.filter(b => b.sw), conductance = active.reduce((s, b) => s + 1 / b.R, 0);
    const parallelR = conductance ? 1 / conductance : Infinity, totalI = conductance ? V / (r0 + parallelR) : 0, terminalV = totalI * parallelR || 0;
    return { model: "circuit", dt: DT, t: time, V, totalI, parallelR, terminalV, branches: branches.map(b => ({ ...b, current: b.sw ? terminalV / b.R : 0, brightness: b.sw ? (terminalV / b.R) ** 2 * b.R : 0 })) };
  }

  window.simStep = (model, params = {}, t = 0) => {
    const time = tick(t);
    if (model === "uniform") return uniform(params, time);
    if (model === "projectile") return projectile(params, time);
    if (model === "circular") return circular(params, time);
    if (model === "energy") return energy(params, time);
    if (model === "circuit") return circuit(params, time);
    throw new Error(`未知仿真模型: ${model}`);
  };
})();

/* ===== src/elo.js ===== */
(() => {
  "use strict";
  const BASE = 1200, K = 32;
  const ids = () => [...GAME.KB.formulas.map(x => x.id), ...GAME.KB.tf.map(x => x.id)];
  const normalize = raw => {
    const now = Date.now(), out = {};
    ids().forEach(id => { const old = raw?.[id] || {}; out[id] = { rating: Number.isFinite(old.rating) ? old.rating : BASE, last: old.last || 0, seen: old.seen || 0, born: now }; });
    return out;
  };
  const expected = (rating, difficulty) => 1 / (1 + 10 ** ((difficulty - rating) / 400));
  const update = (ratings, id, correct, difficulty = BASE) => {
    const all = normalize(ratings), item = all[id] || { rating: BASE, last: 0, seen: 0 };
    item.rating = Math.round(item.rating + K * ((correct ? 1 : 0) - expected(item.rating, difficulty)));
    item.last = Date.now(); item.seen += 1; all[id] = item; return all;
  };
  const pick = (n, ratings = {}) => Object.entries(normalize(ratings))
    .sort((a, b) => a[1].rating - b[1].rating || a[1].last - b[1].last || a[0].localeCompare(b[0]))
    .slice(0, Math.max(0, n | 0)).map(([id]) => id);
  window.PhyElo = { BASE, K, normalize, update, pick };
})();

/* ===== src/save.js ===== */
(() => {
  "use strict";
  const KEY = "phySceneV1", VERSION = 1;
  const fresh = () => ({ version: VERSION, exp: 0, badges: 0, level: 1, completed: [], ratings: PhyElo.normalize(), mistakes: {}, phenomena: [] });
  const migrate = raw => {
    const base = fresh(); if (!raw || typeof raw !== "object") return base;
    const out = { ...base, ...raw, version: VERSION };
    out.exp = Math.max(0, Number(out.exp) || 0); out.badges = Math.max(0, Number(out.badges) || 0);
    out.level = Math.max(1, Math.floor(out.exp / 100) + 1); out.completed = Array.isArray(out.completed) ? [...new Set(out.completed)] : [];
    out.phenomena = Array.isArray(out.phenomena) ? [...new Set(out.phenomena)] : []; out.ratings = PhyElo.normalize(out.ratings);
    return out;
